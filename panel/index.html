<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSeeker 数据面板</title>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; color: #333; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; text-align: center; }
        .header h1 { font-size: 32px; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-2px); }
        .stat-card .label { color: #999; font-size: 14px; margin-bottom: 8px; }
        .stat-card .value { font-size: 36px; font-weight: 700; color: #667eea; }
        .chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .chart-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .chart-card h3 { font-size: 16px; margin-bottom: 15px; color: #555; }
        .chart { width: 100%; height: 350px; }
        .table-section { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .table-section h3 { font-size: 16px; margin-bottom: 15px; color: #555; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; color: #666; font-size: 13px; }
        td { font-size: 14px; }
        tr:hover { background: #f8f9fa; }
        .price { color: #e74c3c; font-weight: 600; }
        .rating { color: #f39c12; }
        .btn { background: #667eea; color: white; border: none; padding: 10px 24px; border-radius: 6px; cursor: pointer; font-size: 14px; margin-bottom: 20px; }
        .btn:hover { background: #5a6fd6; }
        .loading { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <h1>BSeeker 数据面板</h1>
        <p>图书电商数据采集与分析系统</p>
    </div>
    <div class="container">
        <button class="btn" id="refreshBtn">刷新数据</button>
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="label">总图书数</div>
                <div class="value" id="totalBooks">-</div>
            </div>
            <div class="stat-card">
                <div class="label">平均价格</div>
                <div class="value" id="avgPrice">-</div>
            </div>
            <div class="stat-card">
                <div class="label">平均评分</div>
                <div class="value" id="avgRating">-</div>
            </div>
            <div class="stat-card">
                <div class="label">分类数</div>
                <div class="value" id="categoryCount">-</div>
            </div>
        </div>
        <div class="chart-grid">
            <div class="chart-card">
                <h3>价格分布</h3>
                <div id="priceChart" class="chart"></div>
            </div>
            <div class="chart-card">
                <h3>评分分布</h3>
                <div id="ratingChart" class="chart"></div>
            </div>
            <div class="chart-card">
                <h3>热门分类 TOP10</h3>
                <div id="categoryChart" class="chart"></div>
            </div>
            <div class="chart-card">
                <h3>热门出版社 TOP10</h3>
                <div id="publisherChart" class="chart"></div>
            </div>
        </div>
        <div class="table-section">
            <h3>最新图书</h3>
            <table id="booksTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>书名</th>
                        <th>作者</th>
                        <th>出版社</th>
                        <th>价格</th>
                        <th>评分</th>
                        <th>分类</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
    <script>
        let priceChart, ratingChart, categoryChart, publisherChart;

        function initCharts() {
            priceChart = echarts.init(document.getElementById('priceChart'));
            ratingChart = echarts.init(document.getElementById('ratingChart'));
            categoryChart = echarts.init(document.getElementById('categoryChart'));
            publisherChart = echarts.init(document.getElementById('publisherChart'));
            window.addEventListener('resize', function() {
                priceChart.resize();
                ratingChart.resize();
                categoryChart.resize();
                publisherChart.resize();
            });
        }

        function loadData() {
            $('#totalBooks, #avgPrice, #avgRating, #categoryCount').text('加载中...');
            
            $.ajax({
                url: 'api/stats',
                method: 'GET',
                dataType: 'json',
                success: function(data) {
                    $('#totalBooks').text(data.total_books);
                    $('#avgPrice').text('£' + data.avg_price);
                    $('#avgRating').text(data.avg_rating);
                    $('#categoryCount').text(data.top_categories.length);
                    renderCategoryChart(data.top_categories);
                    renderPublisherChart(data.top_publishers);
                },
                error: function() {
                    $('#totalBooks, #avgPrice, #avgRating, #categoryCount').text('Error');
                }
            });

            $.ajax({
                url: 'api/price_distribution',
                method: 'GET',
                dataType: 'json',
                success: function(data) {
                    renderPriceChart(data);
                }
            });

            $.ajax({
                url: 'api/rating_distribution',
                method: 'GET',
                dataType: 'json',
                success: function(data) {
                    renderRatingChart(data);
                }
            });

            $.ajax({
                url: 'api/books?limit=20',
                method: 'GET',
                dataType: 'json',
                success: function(data) {
                    renderTable(data);
                }
            });
        }

        function renderPriceChart(data) {
            const option = {
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'category', data: data.map(d => d.range) },
                yAxis: { type: 'value' },
                series: [{
                    data: data.map(d => d.count),
                    type: 'bar',
                    itemStyle: { color: '#667eea', borderRadius: [4, 4, 0, 0] }
                }]
            };
            priceChart.setOption(option);
        }

        function renderRatingChart(data) {
            const option = {
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'category', data: data.map(d => d.rating) },
                yAxis: { type: 'value' },
                series: [{
                    data: data.map(d => d.count),
                    type: 'bar',
                    itemStyle: { color: '#f39c12', borderRadius: [4, 4, 0, 0] }
                }]
            };
            ratingChart.setOption(option);
        }

        function renderCategoryChart(data) {
            const option = {
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                xAxis: { type: 'value' },
                yAxis: { type: 'category', data: data.map(d => d.category).reverse() },
                series: [{
                    data: data.map(d => d.count).reverse(),
                    type: 'bar',
                    itemStyle: { color: '#2ecc71', borderRadius: [0, 4, 4, 0] }
                }]
            };
            categoryChart.setOption(option);
        }

        function renderPublisherChart(data) {
            const option = {
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                xAxis: { type: 'value' },
                yAxis: { type: 'category', data: data.map(d => d.publisher).reverse() },
                series: [{
                    data: data.map(d => d.count).reverse(),
                    type: 'bar',
                    itemStyle: { color: '#e74c3c', borderRadius: [0, 4, 4, 0] }
                }]
            };
            publisherChart.setOption(option);
        }

        function renderTable(data) {
            const tbody = $('#booksTable tbody');
            tbody.empty();
            data.forEach(function(book) {
                const row = '<tr>' +
                    '<td>' + book.id + '</td>' +
                    '<td>' + (book.title || '-') + '</td>' +
                    '<td>' + (book.author || '-') + '</td>' +
                    '<td>' + (book.publisher || '-') + '</td>' +
                    '<td class="price">£' + (book.price || 0).toFixed(2) + '</td>' +
                    '<td class="rating">' + (book.rating || 0) + '</td>' +
                    '<td>' + (book.category || '-') + '</td>' +
                    '</tr>';
                tbody.append(row);
            });
        }

        $(document).ready(function() {
            initCharts();
            loadData();
            $('#refreshBtn').click(function() {
                loadData();
            });
        });
    </script>
</body>
</html>
